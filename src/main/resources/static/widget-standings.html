<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

    .panel {
      width: 420px;
      background: linear-gradient(160deg, rgba(10,10,14,0.94) 0%, rgba(6,6,10,0.92) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.45);
    }

    .panel-meta {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.5px;
    }

    /* ── Rows ── */
    .standings-list {
      position: relative;
      overflow: hidden;
    }

    .standings-page {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .standings-page.active { opacity: 1; position: relative; pointer-events: auto; }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }
    .standing-row:last-child { border-bottom: none; }

    .sr-rank {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,0.3);
      min-width: 24px;
      text-align: right;
    }
    .sr-rank.top { color: #ffd700; }

    .flag { display: flex; align-items: center; flex-shrink: 0; }

    .sr-info { flex: 1; min-width: 0; }

    .sr-name {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sr-hero {
      font-size: 10px;
      color: rgba(255,255,255,0.38);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sr-wins {
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      min-width: 28px;
      text-align: right;
    }

    .sr-wins-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
      text-align: right;
    }

    .wins-col { display: flex; flex-direction: column; align-items: flex-end; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">STANDINGS</span>
      <span class="panel-meta" id="meta">—</span>
    </div>
    <div class="standings-list" id="list"></div>
  </div>

  <script>
    const ROWS_PER_PAGE  = 8;
    const PAGE_DURATION  = 7000;

    let pages       = [];
    let currentPage = 0;
    let cycleTimer  = null;

    function flag(code) {
      if (!code || code.length !== 2) return '';
      return `<img src="https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@gh-pages/flags/${code.toLowerCase()}.svg"
                   style="width:22px;height:22px;border-radius:50%;vertical-align:middle;flex-shrink:0"
                   onerror="this.style.display='none'">`;
    }

    function heroImg(name, size) {
      if (!name) return '';
      return `<img src="/heroes/${encodeURIComponent(name)}.jpg"
                   style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0"
                   onerror="this.style.display='none'">`;
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render(data) {
      const standings = data.standings || [];
      const round     = data.round     || '—';
      document.getElementById('meta').textContent =
        `ROUND ${round}  ·  ${data.lastUpdated || ''}`;

      const list = document.getElementById('list');
      list.innerHTML = '';
      pages = [];

      if (standings.length === 0) {
        list.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:1px;">NO DATA</div>';
        return;
      }

      const numPages = Math.ceil(standings.length / ROWS_PER_PAGE);

      // Clamp page index if data shrank
      if (currentPage >= numPages) currentPage = numPages - 1;

      for (let p = 0; p < numPages; p++) {
        const pageEl = document.createElement('div');
        // Restore the same page that was active before the data update
        pageEl.className = 'standings-page' + (p === currentPage ? ' active' : '');

        const slice = standings.slice(p * ROWS_PER_PAGE, (p + 1) * ROWS_PER_PAGE);
        slice.forEach(s => {
          pageEl.innerHTML += `
            <div class="standing-row">
              <span class="sr-rank ${s.rank <= 8 ? 'top' : ''}">${s.rank}</span>
              <span class="flag">${flag(s.country)}</span>
              ${heroImg(s.hero, 30)}
              <div class="sr-info">
                <div class="sr-name">${esc(s.name)}</div>
                <div class="sr-hero">${esc(s.hero)}</div>
              </div>
              <div class="wins-col">
                <div class="sr-wins">${s.wins}</div>
                <div class="sr-wins-label">WINS</div>
              </div>
            </div>`;
        });

        list.appendChild(pageEl);
        pages.push(pageEl);
      }

      // DOM was rebuilt so cycle must restart, but currentPage is preserved
      startCycle(numPages);
    }

    function startCycle(numPages) {
      if (cycleTimer) clearInterval(cycleTimer);
      if (numPages <= 1) return;

      cycleTimer = setInterval(() => {
        pages[currentPage].classList.remove('active');
        currentPage = (currentPage + 1) % numPages;
        pages[currentPage].classList.add('active');
      }, PAGE_DURATION);
    }

    function connect() {
      const ws = new WebSocket('ws://localhost:8080/ws/tournament');
      ws.onmessage = e => render(JSON.parse(e.data));
      ws.onclose   = () => setTimeout(connect, 3000);
    }

    connect();
  </script>
</body>
</html>
