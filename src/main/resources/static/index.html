<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="ScreenOrientation" content="autoRotate:disabled">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
	<style>
	*, *:after, *:before {
	  -webkit-box-sizing: border-box;
	  -moz-box-sizing: border-box;
	  box-sizing: border-box;
	}

	* {
		-webkit-transition: opacity 0.1s ease-in-out;
		-moz-transition: opacity 0.1s ease-in-out;
		-o-transition: opacity 0.1s ease-in-out;
		-ms-transition: opacity 0.1s ease-in-out;
		transition: opacity 0.1s ease-in-out;
	}
	html, body {
		margin: 0;
		padding: 0;
		text-align: center;
    	font-size: 2vh;
	}

	div#container {
		display: flex;
		flex-flow: column nowrap;
		height: 60vh;
	}

	header {
		flex: 5 5;
	}

	main {
		flex: 1 1;
	}

	footer {
		flex: 5 5;
	}

	div#YourLife, div#EnemyLife {
		display: flex;
		flex-flow: column nowrap;
		height: 38vh;
	}

	label#YourName, .upsideDown div.lifeValue {
		transform: scale(-1, 1);
	}

	div#YourLife header, div#EnemyLife header{
		flex: 1 1;
	}

	div#YourLife main, div#EnemyLife main {
		flex: 1 1;
	}

	div#YourLife footer, div#EnemyLife footer  {
		flex: 1 1;
	}

	.upsideDown{
		transform: rotateX(180deg);
	}

	label#YourName, label#EnemyName{
		font-size: 0.8em;
		display: block;
		margin: 0 0 0 0;
		padding: 5px 0;
		opacity: 0.9;
		background-color: #EEE;
		background-image: -webkit-gradient(linear, left top, left bottom, color-stop(0%, #EEE), color-stop(100%, #CCC));
		background-image: -webkit-linear-gradient(top, #EEE, #AAA);
		background-image: -moz-linear-gradient(top, #EEE, #AAA);
		background-image: -ms-linear-gradient(top, #EEE, #AAA);
		background-image: -o-linear-gradient(top, #EEE, #AAA);
		background-image: linear-gradient(top, #EEE, #AAA);
		border: 1px solid #999;
		border-bottom: 1px solid #BBB;
		-webkit-border-radius: 30px;
		-moz-border-radius: 30px;
		border-radius: 30px;
		text-shadow: 0 1px 0 #EEE;
		background-color: #EEE;
	}

	#YourUp, #YourDown, #EnemyUp, #EnemyDown {
		opacity: 0.5;
		user-select: none;
		-webkit-user-select: none;
		-ms-user-select: none;
		display: block;
		text-align: center;
		border-bottom: 1px solid #999;
		font-size: 8vh;
	}

	div.lifeValue {
	    text-align: center;
    	font-size: 8vh;
    }

	#YourLife, #EnemyLife{
		opacity: 0.9;
		background-color: #EEE;
		background-image: -webkit-gradient(linear, left top, left bottom, color-stop(0%, #EEE), color-stop(100%, #CCC));
		background-image: -webkit-linear-gradient(top, #EEE, #AAA);
		background-image: -moz-linear-gradient(top, #EEE, #AAA);
		background-image: -ms-linear-gradient(top, #EEE, #AAA);
		background-image: -o-linear-gradient(top, #EEE, #AAA);
		background-image: linear-gradient(top, #EEE, #AAA);
		border: 1px solid #999;
		border-bottom: 1px solid #BBB;
		-webkit-border-radius: 30px;
		-moz-border-radius: 30px;
		border-radius: 30px;
		color: #333;
		font-family: "Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", Geneva, Verdana, sans-serif;
		padding: 8px 0;
		text-align: center;
		text-shadow: 0 1px 0 #EEE;
		user-select: none;
		-webkit-user-select: none;
	}

	div.lifeUp {
		display: block;
		text-align: center;
		border-bottom: 1px solid #999;
	}

	div.lifeDown {
		display: block;
		text-align: center;
		border-top: 1px solid #999;
	}

	#reset{
		float:right;
	}

	#change{
		float:left;
	}
	</style>
</head>
<body>
<div id="container">
	<header class="upsideDown">
		<label id="YourName">Player Left</label>
		<div id="YourLife" class="lifeBox">
			<header>
				<div class="lifeUp" id="YourUp">&#8679;</div>
			</header>
			<main>
				<div class="lifeValue" id="YourCount">20</div>
			</main>
			<footer>
				<div class="lifeDown" id="YourDown">&#8681;</div>
			</footer>
		</div>
	</header>
	<main>
		<button id="reset">&#8634;</button>
		<button id="change">&#11026;</button>
	</main>
	<footer>
		<label id="EnemyName">Player Right</label>
		<div id="EnemyLife" class="lifeBox">
			<header>
				<div class="lifeUp" id="EnemyUp">&#8679;</div>
			</header>
			<main>
				<div class="lifeValue" id="EnemyCount">20</div>
			</main>
			<footer>
				<div class="lifeDown" id="EnemyDown">&#8681;</div>
			</footer>
		</div>
	</footer>
</div>
<script>
		var defaultLife = 40;
		var YourCounter = defaultLife;
		var EnemyCounter = defaultLife;
		var YourHero = "";
		var EnemyHero = "";
		var Mode = "0"; //0 = 1v1, 1 = Commander
		var didItFire = false;
		var isHoldingDown = false;
		var hold_time = 500;
		var save_hold_time = 501;
		var timeout_id = 0;
		var life_timeout_id = 0;
		var enemy_life_timeout_id = 0;

		function YourIncrease(value) {
	      if(value == 5){
	         didItFire = true;
	      }
		  YourCounter = YourCounter + value;
		  if(YourCounter<10){
		    document.getElementById('YourCount').innerHTML = "0"+YourCounter;
		  }else{
		    document.getElementById('YourCount').innerHTML = YourCounter;
		  }
		  clearTimeout(life_timeout_id);
		  life_timeout_id = setTimeout(saveLife, save_hold_time, 1);
		  if(isHoldingDown){
		  	timeout_id = setTimeout(YourIncrease, hold_time, 5);
		  }
		}

		function YourDecrease(value) {
		  if(value == 5){
	         didItFire = true;
	      }
		  if(YourCounter != 0){
		    YourCounter = YourCounter - value;
		  }

		  if(YourCounter<0){
		     YourCounter = 0;
		  }

		  if(YourCounter<10){
		    document.getElementById('YourCount').innerHTML = "0"+YourCounter;
		  }else{
		    document.getElementById('YourCount').innerHTML = YourCounter;
		  }
		  clearTimeout(life_timeout_id);
		  life_timeout_id = setTimeout(saveLife, save_hold_time, 1);
		  if(isHoldingDown){
		  	timeout_id = setTimeout(YourDecrease, hold_time, 5);
		  }
		}

		function EnemyIncrease(value) {
		  if(value == 5){
	         didItFire = true;
	      }
		  EnemyCounter = EnemyCounter + value;

		  if(EnemyCounter<10){
		    document.getElementById('EnemyCount').innerHTML = "0"+EnemyCounter;
		  }else{
		   document.getElementById('EnemyCount').innerHTML = EnemyCounter;
		  }
		  clearTimeout(enemy_life_timeout_id);
		  enemy_life_timeout_id = setTimeout(saveLife, save_hold_time, 2);

		  if(isHoldingDown){
		  	timeout_id = setTimeout(EnemyIncrease, hold_time, 5);
		  }
		}

		function EnemyDecrease(value) {
		  if(value == 5){
	         didItFire = true;
	      }
		  if(EnemyCounter != 0){
		    EnemyCounter = EnemyCounter - value;
		  }

		  if(EnemyCounter<0){
		     EnemyCounter = 0;
		  }

		  if(EnemyCounter<10){
		    document.getElementById('EnemyCount').innerHTML = "0"+EnemyCounter;
		  }else{
		   document.getElementById('EnemyCount').innerHTML = EnemyCounter;
		  }
		  clearTimeout(enemy_life_timeout_id);
		  enemy_life_timeout_id = setTimeout(saveLife, save_hold_time, 2);
		  if(isHoldingDown){
		  	timeout_id = setTimeout(EnemyDecrease, hold_time, 5);
		  }
		}

		function Reset() {
		  if (confirm("Reset life totals?")) {
			YourCounter = defaultLife;
			EnemyCounter = defaultLife;
			document.getElementById('YourCount').innerHTML = YourCounter;
			document.getElementById('EnemyCount').innerHTML = EnemyCounter;
			setMode(0);
		  	saveLife(0);
		  	setTimeout(saveLife, save_hold_time, 0);
		  }
		}

		function ChangeMode() {
		  if (confirm("Reset life totals and change mode?")) {
		    if(defaultLife == 40){
		       defaultLife = 20;
		    } else if(defaultLife == 20){
		       defaultLife = 40;
		    }
			YourCounter = defaultLife;
			EnemyCounter = defaultLife;
			document.getElementById('YourCount').innerHTML = YourCounter;
			document.getElementById('EnemyCount').innerHTML = EnemyCounter;
			setMode(0);
		  	saveLife(0);
		  	setTimeout(saveLife, save_hold_time, 0);
		  }
		}

		function StartReset() {
			YourCounter = defaultLife;
			EnemyCounter = defaultLife;
			document.getElementById('YourCount').innerHTML = YourCounter;
			document.getElementById('EnemyCount').innerHTML = EnemyCounter;
		}

		function Commander() {
		  if (true) {//confirm("Set your life total to 40?")) {
			YourCounter = 40;
			EnemyCounter = 0;
			document.getElementById('YourCount').innerHTML = YourCounter;
			document.getElementById('EnemyCount').innerHTML = EnemyCounter;
			setMode(1);
			clearTimeout(life_timeout_id);
		  	life_timeout_id = setTimeout(saveLife, save_hold_time, 0);
		  }
		}

		function setMode(i) {
		  Mode = i;
		  if (Mode == 0) {
			document.getElementById('EnemyName').innerHTML = "Player Right";
		  } else {
			document.getElementById('EnemyName').innerHTML = "Poison";
		  }
		}

		function supportsLocalStorage() {
		  try {
			return 'localStorage' in window && window['localStorage'] !== null;
		  } catch (e) {
			return false;
		  }
		}

		function saveLife(player) {
			if(player != 2){
				fetch("http://"+location.hostname + ":" + location.port + "/player1/"+YourCounter, {
				  method: "POST"
				});
			}
			if(player != 1){
				fetch("http://"+location.hostname + ":" + location.port + "/player2/"+EnemyCounter, {
				  method: "POST"
				});
			}
		}

		function isMobile() {
		  var check = false;
		  (function(a){
			if(/(android|bb\d+|meego).+mobile|avantgo|bada\/|blackberry|blazer|compal|elaine|fennec|hiptop|iemobile|ip(hone|od)|iris|kindle|lge |maemo|midp|mmp|mobile.+firefox|netfront|opera m(ob|in)i|palm( os)?|phone|p(ixi|re)\/|plucker|pocket|psp|series(4|6)0|symbian|treo|up\.(browser|link)|vodafone|wap|windows ce|xda|xiino/i.test(a)||/1207|6310|6590|3gso|4thp|50[1-6]i|770s|802s|a wa|abac|ac(er|oo|s\-)|ai(ko|rn)|al(av|ca|co)|amoi|an(ex|ny|yw)|aptu|ar(ch|go)|as(te|us)|attw|au(di|\-m|r |s )|avan|be(ck|ll|nq)|bi(lb|rd)|bl(ac|az)|br(e|v)w|bumb|bw\-(n|u)|c55\/|capi|ccwa|cdm\-|cell|chtm|cldc|cmd\-|co(mp|nd)|craw|da(it|ll|ng)|dbte|dc\-s|devi|dica|dmob|do(c|p)o|ds(12|\-d)|el(49|ai)|em(l2|ul)|er(ic|k0)|esl8|ez([4-7]0|os|wa|ze)|fetc|fly(\-|_)|g1 u|g560|gene|gf\-5|g\-mo|go(\.w|od)|gr(ad|un)|haie|hcit|hd\-(m|p|t)|hei\-|hi(pt|ta)|hp( i|ip)|hs\-c|ht(c(\-| |_|a|g|p|s|t)|tp)|hu(aw|tc)|i\-(20|go|ma)|i230|iac( |\-|\/)|ibro|idea|ig01|ikom|im1k|inno|ipaq|iris|ja(t|v)a|jbro|jemu|jigs|kddi|keji|kgt( |\/)|klon|kpt |kwc\-|kyo(c|k)|le(no|xi)|lg( g|\/(k|l|u)|50|54|\-[a-w])|libw|lynx|m1\-w|m3ga|m50\/|ma(te|ui|xo)|mc(01|21|ca)|m\-cr|me(rc|ri)|mi(o8|oa|ts)|mmef|mo(01|02|bi|de|do|t(\-| |o|v)|zz)|mt(50|p1|v )|mwbp|mywa|n10[0-2]|n20[2-3]|n30(0|2)|n50(0|2|5)|n7(0(0|1)|10)|ne((c|m)\-|on|tf|wf|wg|wt)|nok(6|i)|nzph|o2im|op(ti|wv)|oran|owg1|p800|pan(a|d|t)|pdxg|pg(13|\-([1-8]|c))|phil|pire|pl(ay|uc)|pn\-2|po(ck|rt|se)|prox|psio|pt\-g|qa\-a|qc(07|12|21|32|60|\-[2-7]|i\-)|qtek|r380|r600|raks|rim9|ro(ve|zo)|s55\/|sa(ge|ma|mm|ms|ny|va)|sc(01|h\-|oo|p\-)|sdk\/|se(c(\-|0|1)|47|mc|nd|ri)|sgh\-|shar|sie(\-|m)|sk\-0|sl(45|id)|sm(al|ar|b3|it|t5)|so(ft|ny)|sp(01|h\-|v\-|v )|sy(01|mb)|t2(18|50)|t6(00|10|18)|ta(gt|lk)|tcl\-|tdg\-|tel(i|m)|tim\-|t\-mo|to(pl|sh)|ts(70|m\-|m3|m5)|tx\-9|up(\.b|g1|si)|utst|v400|v750|veri|vi(rg|te)|vk(40|5[0-3]|\-v)|vm40|voda|vulc|vx(52|53|60|61|70|80|81|83|85|98)|w3c(\-| )|webc|whit|wi(g |nc|nw)|wmlb|wonu|x700|yas\-|your|zeto|zte\-/i.test(a.substr(0,4)))
			  check = true;
		  })(navigator.userAgent||navigator.vendor||window.opera);
		  return check;
		};

		function prepareOnClicks() {
			if(isMobile() == false){
				document.getElementById('YourUp').onmousedown = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(YourIncrease, hold_time, 5);
				};
				document.getElementById('YourUp').onmouseup = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						YourIncrease(1);
					}
				};
				document.getElementById('YourDown').onmousedown = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(YourDecrease, hold_time, 5);
				};
				document.getElementById('YourDown').onmouseup = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						YourDecrease(1);
					}
				};
				document.getElementById('EnemyUp').onmousedown = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(EnemyIncrease, hold_time, 5);
				}
				document.getElementById('EnemyUp').onmouseup = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						EnemyIncrease(1);
					}
				};
				document.getElementById('EnemyDown').onmousedown = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(EnemyDecrease, hold_time, 5);
				};
				document.getElementById('EnemyDown').onmouseup = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						EnemyDecrease(1);
					}
				};
			} else {
				document.getElementById('YourUp').ontouchstart = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(YourIncrease, hold_time, 5);
				};
				document.getElementById('YourUp').ontouchend = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						YourIncrease(1);
					}
				};
				document.getElementById('YourDown').ontouchstart = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(YourDecrease, hold_time, 5);
				};
				document.getElementById('YourDown').ontouchend = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						YourDecrease(1);
					}
				};
				document.getElementById('EnemyUp').ontouchstart = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(EnemyIncrease, hold_time, 5);
				}
				document.getElementById('EnemyUp').ontouchend = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						EnemyIncrease(1);
					}
				};
				document.getElementById('EnemyDown').ontouchstart = function() {
					didItFire = false;
					isHoldingDown = true;
					timeout_id = setTimeout(EnemyDecrease, hold_time, 5);
				};
				document.getElementById('EnemyDown').ontouchend = function() {
					isHoldingDown = false;
					clearTimeout(timeout_id);
					if(didItFire != true){
						EnemyDecrease(1);
					}
				};
			}
			document.getElementById('reset').onclick = function() { Reset() }
			document.getElementById('change').onclick = function() { ChangeMode() }
			document.getElementById('commander').onclick = function() { Commander() }
		}

		window.onload = function() {
		  prepareOnClicks();
		  var item = document.getElementByID('YourDown');
		  var draggie = new Draggabilly( item, {
			axis: 'y'
		  });
		  if (!supportsLocalStorage()) { return false; }
		  if (!window.localStorage["YourCounter"]) { return false }
		  YourCounter = window.localStorage["YourCounter"];
		  if (!window.localStorage["EnemyCounter"]) { return false }
		  EnemyCounter = window.localStorage["EnemyCounter"];
		  document.getElementById('YourCount').innerHTML = YourCounter;
		  document.getElementById('EnemyCount').innerHTML = EnemyCounter;
		  if (!window.localStorage["Mode"]) { return false }
		  Mode = window.localStorage["Mode"];
		  setMode(Mode);
		}
		StartReset();
	</script>
</body>
</html>
