<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    .bracket {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      padding: 24px 32px;
      gap: 0;
      position: relative;
    }

    .col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex-shrink: 0;
    }

    .col-qf  { height: 100%; }
    .col-sf  { height: 70%;  }
    .col-fin { height: 35%;  }

    .gap { width: 52px; flex-shrink: 0; }

    /* ── Round label ── */
    .round-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .round-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      width: 100%;
    }

    /* ── Match slot ── */
    .match {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* ── Player card ── */
    .pcard {
      width: 280px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: rgba(18,18,24,0.95);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 5px;
      transition: border-color 0.4s, opacity 0.4s;
      position: relative;
      overflow: hidden;
    }

    .pcard.winner {
      border-color: rgba(212,175,55,0.6);
      background: rgba(22,20,14,0.97);
    }
    .pcard.winner::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #d4af37;
      border-radius: 5px 0 0 5px;
    }
    .pcard.loser  { opacity: 0.38; }
    .pcard.tbd    { border-style: dashed; border-color: rgba(255,255,255,0.12); background: rgba(12,12,16,0.7); }

    .pcard .seed {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      min-width: 16px;
      text-align: right;
    }

    .pcard .flag img {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: block;
    }

    .pcard .info {
      flex: 1;
      min-width: 0;
    }

    .pcard .pname {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pcard.winner .pname { color: #f5e99a; }
    .pcard.tbd .pname    { color: rgba(255,255,255,0.3); font-style: italic; }

    .pcard .phero {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pcard .res {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .res-w { background: rgba(76,175,80,0.2); color: #81c784; }
    .res-l { background: rgba(244,67,54,0.15); color: rgba(229,115,115,0.6); }
    .res-d { background: rgba(255,193,7,0.2);  color: #ffd54f; }

    /* ── Champion display ── */
    .champion-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-left: 20px;
      flex-shrink: 0;
    }

    .champ-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #d4af37;
    }

    .champ-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
      background: rgba(22,20,14,0.97);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 8px;
      min-width: 140px;
    }

    .champ-card img { width: 32px; height: 32px; border-radius: 50%; }
    .champ-name { font-size: 15px; font-weight: 800; color: #f5e99a; text-align: center; }
    .champ-hero { font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; }
    .champ-empty { font-size: 12px; color: rgba(255,255,255,0.2); font-style: italic; }

    /* ── SVG lines ── */
    #svg-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }
  </style>
</head>
<body>
<div class="bracket" id="bracket">

  <!-- QF column -->
  <div class="col col-qf" id="col-qf">
    <div class="round-wrap">
      <div class="round-label">QUARTERFINALS</div>
      <div class="match" id="qf0"></div>
    </div>
    <div class="round-wrap">
      <div class="round-label" style="visibility:hidden">—</div>
      <div class="match" id="qf1"></div>
    </div>
    <div class="round-wrap">
      <div class="round-label" style="visibility:hidden">—</div>
      <div class="match" id="qf2"></div>
    </div>
    <div class="round-wrap">
      <div class="round-label" style="visibility:hidden">—</div>
      <div class="match" id="qf3"></div>
    </div>
  </div>

  <div class="gap"></div>

  <!-- SF column -->
  <div class="col col-sf" id="col-sf">
    <div class="round-wrap">
      <div class="round-label">SEMIFINALS</div>
      <div class="match" id="sf0"></div>
    </div>
    <div class="round-wrap">
      <div class="round-label" style="visibility:hidden">—</div>
      <div class="match" id="sf1"></div>
    </div>
  </div>

  <div class="gap"></div>

  <!-- Final column -->
  <div class="col col-fin" id="col-fin">
    <div class="round-wrap">
      <div class="round-label">FINAL</div>
      <div class="match" id="final0"></div>
    </div>
  </div>

  <!-- Champion -->
  <div class="champion-wrap" id="champion-wrap">
    <div class="champ-label">CHAMPION</div>
    <div class="champ-card" id="champ-card">
      <span class="champ-empty">TBD</span>
    </div>
  </div>

  <!-- SVG lines drawn by JS -->
  <svg id="svg-lines" width="100%" height="100%"></svg>
</div>

<script>
  // ── Seeding: 1v8, 4v5, 2v7, 3v6 (standard single elimination) ──────────────
  const SEEDING = [[0,7],[3,4],[1,6],[2,5]]; // [topSeed, bottomSeed] indices in standings

  function flagImg(code, size) {
    if (!code || code.length !== 2) return '';
    return `<img src="https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@gh-pages/flags/${code.toLowerCase()}.svg"
                 style="width:${size}px;height:${size}px;border-radius:50%"
                 onerror="this.style.display='none'">`;
  }

  function heroImg(name, size) {
    if (!name) return '';
    return `<img src="/heroes/${encodeURIComponent(name)}.jpg"
                 style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0"
                 onerror="this.style.display='none'">`;
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function makePlayer(standing) {
    if (!standing) return null;
    return { name: standing.name, hero: standing.hero, country: standing.country, seed: standing.rank };
  }

  function winnerOf(pairing) {
    if (!pairing || !pairing.result) return null;
    if (pairing.result === '1WIN') return 'p1';
    if (pairing.result === '2WIN') return 'p2';
    if (pairing.result === 'DRAW') return 'draw';
    return null;
  }

  function playerFromPairing(pairing, side, heroes) {
    const name = side === 'p1' ? pairing.p1Name : pairing.p2Name;
    if (!name || name === 'None') return null;
    return { name, hero: side === 'p1' ? pairing.p1Hero : pairing.p2Hero,
             country: side === 'p1' ? pairing.p1Country : pairing.p2Country, seed: 0 };
  }

  function cardHtml(player, state /* 'default'|'winner'|'loser'|'tbd' */, result, side) {
    if (!player) {
      return `<div class="pcard tbd">
        <div class="info"><div class="pname">TBD</div></div>
      </div>`;
    }
    let resHtml = '';
    if (result) {
      const win = (result === '1WIN' && side === 'p1') || (result === '2WIN' && side === 'p2');
      const draw = result === 'DRAW';
      resHtml = draw ? `<span class="res res-d">DRAW</span>` :
                win  ? `<span class="res res-w">WIN</span>` :
                       `<span class="res res-l">LOSS</span>`;
    }
    return `<div class="pcard ${state}">
      <span class="seed">${player.seed > 0 ? player.seed : ''}</span>
      <span class="flag">${flagImg(player.country, 20)}</span>
      ${heroImg(player.hero, 34)}
      <div class="info">
        <div class="pname">${esc(player.name)}</div>
        <div class="phero">${esc(player.hero)}</div>
      </div>
      ${resHtml}
    </div>`;
  }

  function setMatch(id, p1, p2, result) {
    const w = winnerOf({result});
    const s1 = !result ? 'default' : w === 'p1' ? 'winner' : w === 'draw' ? 'default' : 'loser';
    const s2 = !result ? 'default' : w === 'p2' ? 'winner' : w === 'draw' ? 'default' : 'loser';
    const el = document.getElementById(id);
    if (el) el.innerHTML = cardHtml(p1, s1, result, 'p1') + cardHtml(p2, s2, result, 'p2');
  }

  function setChampion(player) {
    const card = document.getElementById('champ-card');
    if (!player) { card.innerHTML = '<span class="champ-empty">TBD</span>'; return; }
    card.innerHTML = `${heroImg(player.hero, 54)}
      <div style="display:flex;align-items:center;gap:6px;justify-content:center">
        ${flagImg(player.country, 18)}
        <div class="champ-name">${esc(player.name)}</div>
      </div>
      <div class="champ-hero">${esc(player.hero)}</div>`;
  }

  // ── Build bracket from data ──────────────────────────────────────────────────
  function buildBracket(data) {
    const standings = (data.standings || []).slice(0, 8);
    const byRound   = data.pairingsByRound || {};

    // Detect playoff rounds: first round with exactly 4, 2, or 1 active match(es)
    // after the "bulk" Swiss rounds.
    const roundNums = Object.keys(byRound).map(Number).sort((a,b) => a-b);
    const maxSwissTables = Math.max(...roundNums.slice(0,-3).map(r =>
      (byRound[r]||[]).filter(p => p.p2Name && p.p2Name !== 'None').length), 0);

    let qfRound = null, sfRound = null, finRound = null;
    for (const r of roundNums) {
      const active = (byRound[r]||[]).filter(p => p.p2Name && p.p2Name !== 'None').length;
      if (active === 4 && !qfRound) qfRound = r;
      else if (active === 2) sfRound = r;
      else if (active === 1) finRound = r;
    }

    // ── QF ─────────────────────────────────────────────────────────────────────
    let qf = [null,null,null,null]; // [p1,p2,result] × 4
    if (qfRound) {
      const pairs = (byRound[qfRound]||[]).sort((a,b)=>a.table-b.table);
      pairs.slice(0,4).forEach((p,i) => {
        qf[i] = { p1: playerFromPairing(p,'p1'), p2: playerFromPairing(p,'p2'), result: p.result };
      });
    } else if (standings.length >= 8) {
      // Predict from seedings
      SEEDING.forEach(([s1,s2],i) => {
        qf[i] = { p1: makePlayer(standings[s1]), p2: makePlayer(standings[s2]), result: '' };
      });
    }

    qf.forEach((m,i) => m && setMatch('qf'+i, m.p1, m.p2, m.result));

    // ── SF ─────────────────────────────────────────────────────────────────────
    let sf = [null,null];
    if (sfRound) {
      const pairs = (byRound[sfRound]||[]).sort((a,b)=>a.table-b.table);
      pairs.slice(0,2).forEach((p,i) => {
        sf[i] = { p1: playerFromPairing(p,'p1'), p2: playerFromPairing(p,'p2'), result: p.result };
      });
    } else {
      // Derive from QF winners
      function qfWinner(i) {
        if (!qf[i]) return null;
        const w = winnerOf(qf[i]);
        return w === 'p1' ? qf[i].p1 : w === 'p2' ? qf[i].p2 : null;
      }
      sf[0] = { p1: qfWinner(0), p2: qfWinner(1), result: '' };
      sf[1] = { p1: qfWinner(2), p2: qfWinner(3), result: '' };
    }
    sf.forEach((m,i) => m && setMatch('sf'+i, m.p1, m.p2, m.result));

    // ── Final ──────────────────────────────────────────────────────────────────
    let fin = null;
    if (finRound) {
      const p = (byRound[finRound]||[])[0];
      if (p) fin = { p1: playerFromPairing(p,'p1'), p2: playerFromPairing(p,'p2'), result: p.result };
    } else {
      function sfWinner(i) {
        if (!sf[i]) return null;
        const w = winnerOf(sf[i]);
        return w === 'p1' ? sf[i].p1 : w === 'p2' ? sf[i].p2 : null;
      }
      fin = { p1: sfWinner(0), p2: sfWinner(1), result: '' };
    }
    if (fin) setMatch('final0', fin.p1, fin.p2, fin.result);

    // ── Champion ───────────────────────────────────────────────────────────────
    if (fin) {
      const w = winnerOf(fin);
      const champ = w === 'p1' ? fin.p1 : w === 'p2' ? fin.p2 : null;
      setChampion(champ);
    }

    // Draw SVG lines after DOM settles
    requestAnimationFrame(() => requestAnimationFrame(drawLines));
  }

  // ── SVG connector lines ────────────────────────────────────────────────────
  function drawLines() {
    const svg  = document.getElementById('svg-lines');
    const wrap = document.getElementById('bracket');
    const br   = wrap.getBoundingClientRect();
    svg.innerHTML = '';

    function line(fromId, toId) {
      const from = document.getElementById(fromId);
      const to   = document.getElementById(toId);
      if (!from || !to) return;
      const fr = from.getBoundingClientRect();
      const tr = to.getBoundingClientRect();
      const x1 = fr.right  - br.left;
      const y1 = fr.top    + fr.height/2 - br.top;
      const x2 = tr.left   - br.left;
      const y2 = tr.top    + tr.height/2 - br.top;
      const mx = x1 + (x2 - x1) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} H${mx} V${y2} H${x2}`);
      path.setAttribute('stroke','rgba(255,255,255,0.14)');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('fill','none');
      svg.appendChild(path);
    }

    // QF → SF
    const qf0el = document.getElementById('qf0')?.querySelector('.pcard:first-child');
    const qf1el = document.getElementById('qf1')?.querySelector('.pcard:first-child');
    const sf0el = document.getElementById('sf0')?.querySelector('.pcard:first-child');
    // Use match divs directly
    line('qf0','sf0'); line('qf1','sf0');
    line('qf2','sf1'); line('qf3','sf1');
    // SF → Final
    line('sf0','final0'); line('sf1','final0');
    // Final → Champion
    const fin  = document.getElementById('final0');
    const champ = document.getElementById('champ-card');
    if (fin && champ) {
      const fr = fin.getBoundingClientRect();
      const cr = champ.getBoundingClientRect();
      const x1 = fr.right  - br.left;
      const y1 = fr.top    + fr.height/2 - br.top;
      const x2 = cr.left   - br.left;
      const y2 = cr.top    + cr.height/2 - br.top;
      const p = document.createElementNS('http://www.w3.org/2000/svg','line');
      p.setAttribute('x1',x1); p.setAttribute('y1',y1);
      p.setAttribute('x2',x2); p.setAttribute('y2',y2);
      p.setAttribute('stroke','rgba(212,175,55,0.4)');
      p.setAttribute('stroke-width','1.5');
      svg.appendChild(p);
    }
  }

  window.addEventListener('resize', () => requestAnimationFrame(drawLines));

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connect() {
    const ws = new WebSocket('ws://localhost:8080/ws/tournament');
    ws.onmessage = e => buildBracket(JSON.parse(e.data));
    ws.onclose   = () => setTimeout(connect, 3000);
  }
  connect();
</script>
</body>
</html>
